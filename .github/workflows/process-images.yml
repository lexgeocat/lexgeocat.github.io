name: Process uploaded images

on:
  push:
    branches: [main]
    paths:
      - 'raw-uploads/**'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install --quiet pillow

      - name: Process images
        run: python scripts/process_images.py

      - name: Commit processed WebPs
        run: |
          set -e
          # Stage SOLO los WebPs nuevos producidos por el script + mover los raws
          # a _processed/ (gitignored, auditoría local).
          git add 'src/assets/img/normativa/*.webp' 'src/assets/img/servicios/*.webp' || true
          git add 'raw-uploads/**' || true

          if git diff --cached --quiet; then
            echo "No hay WebPs nuevos que commitear."
            echo "changes_detected=false" >> "$GITHUB_OUTPUT"
          else
            git -c user.name='github-actions[bot]' \
                -c user.email='github-actions[bot]@users.noreply.github.com' \
                commit -m 'chore: process uploaded images [skip ci]'
            git push
            echo "changes_detected=true" >> "$GITHUB_OUTPUT"
          fi
        id: auto-commit

      - name: Trigger deploy
        if: steps.auto-commit.outputs.changes_detected == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy.yml --ref main
