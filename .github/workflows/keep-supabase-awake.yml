name: Keep Supabase Awake

on:
  schedule:
    # Cada 6 horas — el tier gratis hiberna tras ~1 semana de inactividad
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping servicios table
        run: |
          curl -s -o /dev/null -w "%{http_code}\n" \
            -H "apikey: ${ANON_KEY}" \
            -H "Authorization: Bearer ${ANON_KEY}" \
            "${SUPABASE_URL}/rest/v1/servicios?select=count&limit=1"
