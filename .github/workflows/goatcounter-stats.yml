name: Fetch GoatCounter Stats

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch stats from GoatCounter API
        env:
          GOAT_TOKEN: ${{ secrets.GOAT_TOKEN }}
        run: |
          mkdir -p assets/data

          # ── TOTAL DE VISITAS ──────────────────────────────────────────────────
          # Endpoint correcto: /api/v0/stats/hits devuelve { hits: [...] }
          # Sumamos el campo "count" de cada entrada para obtener el total real.
          TOTAL_RESPONSE=$(curl -s \
            -H "Authorization: Bearer $GOAT_TOKEN" \
            -H "Accept: application/json" \
            "https://cris99.goatcounter.com/api/v0/stats/hits?start=2000-01-01&end=2099-12-31&daily=false")

          # La respuesta tiene { hits: [ {day, count} ] }
          # Sumamos todos los count
          TOTAL=$(echo "$TOTAL_RESPONSE" | jq '[.hits[]?.count // 0] | add // 0')

          # Fallback: si hits no funciona, intentamos endpoint /count público
          if [ "$TOTAL" = "0" ] || [ -z "$TOTAL" ]; then
            TOTAL_PUBLIC=$(curl -s "https://cris99.goatcounter.com/counter/TOTAL.json" 2>/dev/null || echo '{"count":"0"}')
            TOTAL=$(echo "$TOTAL_PUBLIC" | jq -r '.count // "0"' | tr -d ',.' | grep -oE '[0-9]+' | head -1 || echo 0)
            TOTAL=${TOTAL:-0}
          fi

          echo "Total visits: $TOTAL"

          # ── TOP PAÍSES ────────────────────────────────────────────────────────
          # Endpoint correcto: /api/v0/stats/countries (NO "browsers?stat=country")
          COUNTRIES_RESPONSE=$(curl -s \
            -H "Authorization: Bearer $GOAT_TOKEN" \
            -H "Accept: application/json" \
            "https://cris99.goatcounter.com/api/v0/stats/countries?start=2000-01-01&end=2099-12-31&limit=10")

          # La respuesta tiene { stats: [ {id, name, count, count_unique} ] }
          COUNTRIES=$(echo "$COUNTRIES_RESPONSE" | jq '[.stats[]? | {id: .id, name: .name, count: (.count // 0)}] | sort_by(-.count) // []')

          # Fallback a array vacío si falla
          if [ "$COUNTRIES" = "null" ] || [ -z "$COUNTRIES" ]; then
            COUNTRIES="[]"
          fi

          echo "Countries fetched: $(echo "$COUNTRIES" | jq length)"

          # ── ESCRIBIR stats.json ───────────────────────────────────────────────
          jq -n \
            --argjson total "$TOTAL" \
            --argjson countries "$COUNTRIES" \
            --arg updated_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{total: $total, countries: $countries, updated_at: $updated_at}' \
            > assets/data/stats.json

          echo "Written stats.json — Total: $TOTAL"
          cat assets/data/stats.json

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/data/stats.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update GoatCounter stats [skip ci]"
            git push
          fi