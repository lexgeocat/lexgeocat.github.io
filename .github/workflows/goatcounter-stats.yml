name: Fetch GoatCounter Stats

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch stats from GoatCounter API
        env:
          GOAT_TOKEN: ${{ secrets.GOAT_TOKEN }}
        run: |
          mkdir -p assets/data

          # Fechas: desde el inicio hasta ahora — formato requerido por la API
          START="2000-01-01T00:00:00Z"
          END=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          BASE="https://cris99.goatcounter.com/api/v0"
          AUTH="Authorization: Bearer $GOAT_TOKEN"

          # ── TOTAL de visitas ───────────────────────────────────────────────
          # Endpoint: GET /api/v0/stats/total
          # Respuesta: { "total": N, "total_events": N, "total_utc": N, "stats": [...] }
          TOTAL_JSON=$(curl -s \
            -H "Content-Type: application/json" \
            -H "$AUTH" \
            "$BASE/stats/total?start=$START&end=$END")

          echo "Total response: $TOTAL_JSON"

          TOTAL=$(echo "$TOTAL_JSON" | jq '.total // 0')

          # ── TOP PAÍSES ────────────────────────────────────────────────────
          # Endpoint: GET /api/v0/stats/locations
          # Respuesta: { "stats": [ { "id": "BO", "name": "Bolivia", "count": N } ], "more": false }
          LOC_JSON=$(curl -s \
            -H "Content-Type: application/json" \
            -H "$AUTH" \
            "$BASE/stats/locations?start=$START&end=$END&limit=10")

          echo "Locations response: $LOC_JSON"

          COUNTRIES=$(echo "$LOC_JSON" | jq '[.stats[]? | {id: .id, name: .name, count: .count}] | sort_by(-.count) // []')

          if [ "$COUNTRIES" = "null" ] || [ -z "$COUNTRIES" ]; then
            COUNTRIES="[]"
          fi

          echo "Total: $TOTAL | Countries: $(echo "$COUNTRIES" | jq length)"

          # ── Escribir stats.json ────────────────────────────────────────────
          jq -n \
            --argjson total "$TOTAL" \
            --argjson countries "$COUNTRIES" \
            --arg updated_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{total: $total, countries: $countries, updated_at: $updated_at}' \
            > assets/data/stats.json

          echo "=== stats.json generado ==="
          cat assets/data/stats.json

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/data/stats.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            BRANCH="${GITHUB_REF#refs/heads/}"
            git commit -m "chore: update GoatCounter stats [skip ci]"
            git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" "HEAD:$BRANCH"
          fi