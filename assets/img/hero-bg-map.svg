<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <radialGradient id="hero-fade" cx="50%" cy="50%" r="55%">
      <stop offset="5%" stop-color="white" stop-opacity="1" />
      <stop offset="100%" stop-color="white" stop-opacity="0" />
    </radialGradient>
    <mask id="hero-mask">
      <rect width="1400" height="900" fill="url(#hero-fade)" />
    </mask>
    <filter id="loc-glow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <style type="text/css"><![CDATA[
      @keyframes lgc-lpaz-pulse-outer {
        0%   { transform: scale(0.6); opacity: 0.9; }
        100% { transform: scale(2.4); opacity: 0; }
      }
      @keyframes lgc-lpaz-pulse-mid {
        0%   { transform: scale(0.6); opacity: 0.9; }
        100% { transform: scale(1.8); opacity: 0; }
      }
      @keyframes lgc-lpaz-dot-glow {
        0%, 100% { opacity: 1; }
        50%      { opacity: 0.55; }
      }
      .lpaz-pulse-outer {
        transform-origin: 425px 300px;
        transform-box: fill-box;
        animation: lgc-lpaz-pulse-outer 3s ease-out infinite;
      }
      .lpaz-pulse-mid {
        transform-origin: 425px 300px;
        transform-box: fill-box;
        animation: lgc-lpaz-pulse-mid 3s ease-out infinite 0.6s;
      }
      .lpaz-dot {
        animation: lgc-lpaz-dot-glow 3s ease-in-out infinite 1s;
      }
    ]]></style>
  </defs>

  <g mask="url(#hero-mask)" class="hero-contour-group">
    <circle cx="425" cy="300" r="32" fill="none" stroke="#C8960C" stroke-width="0.7" class="lpaz-pulse-outer" />
    <circle cx="425" cy="300" r="20" fill="none" stroke="#C8960C" stroke-width="1" class="lpaz-pulse-mid" />
    <circle cx="425" cy="300" r="10" fill="none" stroke="#C8960C" stroke-width="1.2" />
    <circle cx="425" cy="300" r="4.5" fill="#C8960C" filter="url(#loc-glow)" class="lpaz-dot" />
    <circle cx="425" cy="300" r="2" fill="#fff" />

    <line x1="425" y1="300" x2="740" y2="390" stroke="#C8960C" stroke-width="0.9" stroke-dasharray="4,3" opacity="0.7" />

    <rect x="738" y="340" width="150" height="72" rx="3" fill="rgba(13,27,42,0.92)" stroke="#C8960C" stroke-width="0.9" />
    <line x1="738" y1="357" x2="938" y2="357" stroke="#C8960C" stroke-width="0.4" opacity="0.55" />
    <text x="744" y="353" font-family="DM Mono,monospace" font-size="8" fill="#C8960C" opacity="0.65" letter-spacing="0.08em">PUNTO DE UBICACIÓN</text>
    <text x="744" y="372" font-family="DM Mono,monospace" font-size="11" fill="#C8960C" font-weight="bold" letter-spacing="0.04em">Lat: 17°02'20.20"S</text>
    <text x="744" y="388" font-family="DM Mono,monospace" font-size="11" fill="#C8960C" letter-spacing="0.04em">Long: 68°17'45.88"W</text>
    <text x="744" y="404" font-family="DM Mono,monospace" font-size="7.5" fill="#C8960C" opacity="0.5" letter-spacing="0.05em">alt. 3827m · WGS84 · UTM 19S</text>

    <line x1="700" y1="0" x2="700" y2="900" stroke="#C8960C" stroke-width="0.4" opacity="0.08" stroke-dasharray="8,6" />
    <line x1="0" y1="450" x2="1400" y2="450" stroke="#C8960C" stroke-width="0.4" opacity="0.08" stroke-dasharray="8,6" />
  </g>
</svg>
